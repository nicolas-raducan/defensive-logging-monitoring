# Splunk saved-search / scheduled alert — brute-force / password-spray detection
# Exported from the indexer: $SPLUNK_HOME/etc/users/admin/search/local/savedsearches.conf
# Reuse: drop this stanza into a savedsearches.conf under your Splunk search app.
# Full rationale, threshold logic & validation: ../docs/03-brute-force-detection.md
#
# Trigger reads as "Number of Results > 0" (counttype=number of events, quantity=0,
# relation=greater than) — the real >=10 threshold lives inside the search itself.
# alert.severity = 4 => High. Suppressed (throttled) 15m by Source_Network_Address.

[Brute force pass]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = Source_Network_Address
alert.suppress.period = 15m
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = An alert set for brute-force attacks on multiple accounts
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index = endpoint EventCode=4625 Logon_Type=3 | bin _time span=5m | stats count dc(Account_Name) as users_targeted by _time, Source_Network_Address | where count >= 10
